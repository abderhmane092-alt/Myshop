<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')  }} ">
</head>

<body>

    <div class="container ">
        <h1>Welcome to our shop 🛒</h1>
        <p class="subtitle ">Discover amazing products and offers</p>

        <a href="{{ url_for( 'login') }} " class="login ">Login</a>
        <br>
        <a href="{{ url_for( 'register') }} " class="register ">Register</a>

    </div>
    <!-- admin تحكم بمنتجات من خلال  -->
    {% for product in products %}
    <div class="card">
        <img src="{{url_for('static', filename='image/' + product.image)}}">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <p>${{ product.price }}</p>
        <button>Buy Now</button>
    </div>
    {% else %}
    <p>لا توجد منتجات</p>
    {% endfor %}

</body>

</html>
